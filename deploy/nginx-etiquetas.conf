# Ejemplo de sitio Nginx: HTTPS, SPA React (dist/) y proxy a Node en loopback.
# Ajusta: server_name, ssl_certificate*, root, y el puerto en proxy_pass (debe coincidir con PORT del backend).
#
# Ubicación típica tras copiar: /etc/nginx/sites-available/etiquetas
# sudo ln -s /etc/nginx/sites-available/etiquetas /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

upstream etiquetas_api {
    server 127.0.0.1:50000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name sistema.tudominio.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sistema.tudominio.com;

    ssl_certificate     /etc/letsencrypt/live/sistema.tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sistema.tudominio.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/etiquetas/dist;
    index index.html;

    # SPA: rutas del cliente
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API: reenvío sin recortar el prefijo /api (proxy_pass sin URI al final).
    location /api {
        proxy_pass http://etiquetas_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
